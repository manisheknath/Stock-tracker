<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EOD Signal Screener</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
  </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <header class="border-b border-slate-800 px-6 py-4">
    <div class="flex items-center justify-between flex-wrap gap-2">
      <div class="flex items-center gap-6">
        <h1 class="text-lg font-semibold tracking-tight">EOD Signal Screener</h1>
        <nav class="flex gap-1">
          <button data-view="signals" class="view-tab px-3 py-1.5 text-sm rounded-md">Signals</button>
          <button data-view="strategy-health" class="view-tab px-3 py-1.5 text-sm rounded-md">Strategy Health</button>
        </nav>
      </div>
      <div id="data-as-of" class="text-sm text-slate-400">Data as of &mdash;</div>
    </div>
    <div id="market-timestamps" class="mt-2 flex flex-wrap gap-x-4 gap-y-1 text-xs text-slate-500"></div>
  </header>

  <main id="app" class="px-6 py-6"></main>

  <div id="drawer-backdrop" class="fixed inset-0 bg-black/60 hidden z-40"></div>
  <aside id="drawer" class="fixed top-0 right-0 h-full w-full max-w-3xl bg-slate-900 border-l border-slate-800 translate-x-full transition-transform duration-200 z-50 overflow-y-auto"></aside>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
